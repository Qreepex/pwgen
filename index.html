<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body>
    <div class="pw-container">  

      <div class="pw-header">  
        <div class="pw">  
          <span id="pw"> Password Here</span>  
          <button id="copy">Copy</button>  
        </div>  
      </div>  

      <div class="pw-body">  

        <div class="form-control">  
          <lable for="length">Password Length</lable>  
          <input id="len" value="16" type="number" min="16" max="128">  
        </div>  

        <div class="form-control">  
          <lable for="upper">Contain Uppercase Letters</lable>  
          <input id="upper" type="checkbox" checked="true">  
        </div>  

        <div class="form-control">  
          <lable for="lower">Contain Lowercase Letters</lable>  
          <input id="lower" type="checkbox" checked="true">  
        </div>  

        <div class="form-control">  
          <lable for="number">Contain Numbers</lable>  
          <input id="number" type="checkbox" checked="true">  
        </div>  

        <div class="form-control">  
          <lable for="symbol">Contain Symbols</lable>  
          <input id="symbol" type="checkbox" checked="true">  
        </div>  

        <button class="generate" id="generate">Generate Password</button>  

      </div>  
    </div>  
    <script src="./assets/js/index.js"></script>  
  </body>
</html>
